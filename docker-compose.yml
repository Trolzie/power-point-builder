services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - TEMPLATES_DIR=/data/templates
      - OUTPUT_DIR=/data/output
    volumes:
      - ./templates:/data/templates
      - ./output:/data/output

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
